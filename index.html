<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  font-family:Georgia,serif;
  background:#0a0a0a;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh;
  color:#f0ede4;
}

/* Fond animé */
.bg-grid{
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(212,168,67,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,67,.04) 1px, transparent 1px);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{ from{background-position:0 0;} to{background-position:60px 60px;} }

.glow{
  position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(15,60,25,.8) 0%, transparent 70%);
  pointer-events:none;
}

/* Contenu */
.container{
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  gap:48px;
}

/* Logo */
.logo-wrap{
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.suits{
  display:flex; gap:20px; font-size:2rem;
  opacity:.35;
}
.suits span:nth-child(2), .suits span:nth-child(4){ color:#c62828; }
.casino-name{
  font-size:3.8rem; color:#d4a843;
  letter-spacing:.18em;
  text-shadow:0 0 40px rgba(212,168,67,.4), 0 0 80px rgba(212,168,67,.15);
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse{
  0%,100%{ text-shadow:0 0 40px rgba(212,168,67,.4), 0 0 80px rgba(212,168,67,.15); }
  50%    { text-shadow:0 0 60px rgba(212,168,67,.65), 0 0 120px rgba(212,168,67,.3); }
}
.casino-sub{
  font-size:.85rem; letter-spacing:.45em; color:rgba(212,168,67,.45);
  text-transform:uppercase;
}

/* Séparateur */
.divider{
  width:320px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(212,168,67,.35), transparent);
}

/* Cards de jeu */
.games-row{
  display:flex; gap:32px; align-items:stretch; flex-wrap:wrap; justify-content:center;
}

.game-card{
  width:220px;
  background:linear-gradient(145deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border:1px solid rgba(212,168,67,.2);
  border-radius:20px;
  padding:32px 24px;
  display:flex; flex-direction:column; align-items:center; gap:16px;
  cursor:pointer;
  text-decoration:none; color:inherit;
  transition:transform .22s cubic-bezier(.16,1,.3,1), border-color .22s, box-shadow .22s, background .22s;
  position:relative; overflow:hidden;
}
.game-card::before{
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(145deg, rgba(212,168,67,.06), transparent);
  opacity:0; transition:opacity .22s;
  border-radius:20px;
}
.game-card:hover{
  transform:translateY(-8px) scale(1.03);
  border-color:rgba(212,168,67,.55);
  box-shadow:0 20px 50px rgba(0,0,0,.6), 0 0 30px rgba(212,168,67,.12);
}
.game-card:hover::before{ opacity:1; }
.game-card:active{ transform:translateY(-4px) scale(1.01); }

.game-icon{
  font-size:3.4rem;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
  transition:transform .22s;
}
.game-card:hover .game-icon{ transform:scale(1.12) rotate(-3deg); }

.game-title{
  font-size:1.35rem; color:#d4a843;
  letter-spacing:.1em; text-transform:uppercase;
}
.game-desc{
  font-size:.76rem; color:#9a9688;
  text-align:center; line-height:1.5;
  font-style:italic;
}
.game-badge{
  font-size:.7rem; font-weight:700;
  padding:4px 12px; border-radius:99px;
  letter-spacing:.06em; text-transform:uppercase;
}
.badge-green{ background:rgba(76,175,112,.15); color:#4caf70; border:1px solid rgba(76,175,112,.3); }
.badge-blue { background:rgba(100,160,255,.12); color:#7eb8ff; border:1px solid rgba(100,160,255,.28); }

/* Footer */
.footer{
  font-size:.7rem; color:rgba(255,255,255,.15);
  letter-spacing:.15em; text-transform:uppercase;
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow"></div>

<div class="container">

  <div class="logo-wrap">
    <div class="suits">
      <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
    </div>
    <div class="casino-name">CASINO</div>
    <div class="casino-sub">Choisissez votre jeu</div>
  </div>

  <div class="divider"></div>

  <div class="games-row">

    <a class="game-card" href="blackjack.html">
      <div class="game-icon">🃏</div>
      <div class="game-title">Blackjack</div>
      <div class="game-desc">7 cases, sabot 6 decks,<br>split &amp; double disponibles</div>
      <div class="game-badge badge-green">Disponible</div>
    </a>

    <a class="game-card" href="entrainement.html">
      <div class="game-icon">🎯</div>
      <div class="game-title">Entrainement</div>
      <div class="game-desc">Pratiquez vos strategies<br>sans miser d'argent</div>
      <div class="game-badge badge-green">Disponible</div>
    </a>

  </div>

  <div class="footer">Jouez de manière responsable</div>

</div>

</body>
</html>
